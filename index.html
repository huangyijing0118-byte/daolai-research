<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稻来调研报告 | DOC◇LABS Research</title>
<style>
:root{
  --yellow:#FFC72C;--black:#000;--grey:#333;--mid-grey:#999;--white:#fff;
  --bronze:#8B6914;--blue:#4A627C;--warm-grey:#B5A999;
  --grad-brand:linear-gradient(135deg,#FFC72C 0%,#D4981A 40%,#8B6914 100%);
  --grad-brand-h:linear-gradient(90deg,#FFC72C 0%,#D4981A 40%,#8B6914 100%);
  --grad-dark:linear-gradient(180deg,#0A0A0A 0%,#000 100%);
  --surface:#0A0A0A;--surface2:#111;--border:#1C1C1C;--border-brand:rgba(255,199,44,.3);
  --text:#F0EDE6;--text2:#A8A098;--text3:#666;
  --glow:rgba(255,199,44,.06);--glow2:rgba(255,199,44,.12);
  --radius:12px;--radius-sm:6px;
  --font-cn:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Source Han Sans CN",sans-serif;
  --font-en:"Avenir Next","Avenir","Helvetica Neue","Segoe UI",sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;scroll-behavior:smooth}
body{font-family:var(--font-cn);background:#000;color:var(--text);line-height:1.7;overflow:hidden;height:100vh}
::selection{background:var(--yellow);color:#000}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--mid-grey)}
a{color:var(--yellow);text-decoration:none;transition:color .2s var(--ease)}
a:hover{color:#ffe066}

/* ===== TOP NAV ===== */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;height:56px;
  display:flex;align-items:center;gap:16px;padding:0 28px;
  background:rgba(0,0,0,.92);backdrop-filter:blur(20px) saturate(1.2);
  border-bottom:1px solid var(--border);
}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--yellow) 50%,transparent);opacity:.18}
.topbar-logo{height:28px;width:auto;cursor:pointer;flex-shrink:0;transition:opacity .2s}
.topbar-logo:hover{opacity:.85}
.topbar-search{flex:1;max-width:480px;position:relative}
.topbar-search input{
  width:100%;height:36px;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:0 36px 0 38px;font-size:13px;color:var(--text);
  font-family:var(--font-cn);outline:none;transition:border-color .25s var(--ease),box-shadow .25s var(--ease);
}
.topbar-search input::placeholder{color:var(--text3)}
.topbar-search input:focus{border-color:var(--yellow);box-shadow:0 0 0 3px rgba(255,199,44,.08)}
.topbar-search .s-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.topbar-search .s-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--text3);cursor:pointer;display:none;font-size:16px;line-height:1}
.topbar-search .s-clear:hover{color:var(--yellow)}
.topbar-meta{margin-left:auto;font-size:11px;color:var(--text3);font-family:var(--font-en);white-space:nowrap;letter-spacing:.5px}
.topbar-meta b{color:var(--yellow);font-weight:700}
.mob-btn{display:none;background:none;border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;flex-shrink:0}

/* ===== LAYOUT ===== */
.layout{display:flex;margin-top:56px;height:calc(100vh - 56px)}

/* ===== SIDEBAR ===== */
.sidebar{
  width:264px;flex-shrink:0;border-right:1px solid var(--border);
  overflow-y:auto;background:#000;padding:0;
}
.sb-root{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sb-root h2{font-size:14px;font-weight:800;color:var(--yellow);letter-spacing:1.5px;line-height:1.4}
.sb-root p{font-size:10px;color:var(--text3);letter-spacing:3px;margin-top:4px;font-family:var(--font-en);text-transform:uppercase}
.sb-label{font-size:10px;color:var(--text3);letter-spacing:3px;text-transform:uppercase;padding:20px 20px 8px;font-weight:700;font-family:var(--font-en)}
.nav-folder{margin-bottom:1px}
.nav-folder-hd{
  display:flex;align-items:center;gap:8px;padding:10px 20px;cursor:pointer;
  border-left:2px solid transparent;transition:all .15s var(--ease);
}
.nav-folder-hd:hover{background:var(--glow);border-left-color:var(--grey)}
.nav-folder-hd .arrow{font-size:8px;color:var(--text3);transition:transform .2s var(--ease);width:10px;text-align:center}
.nav-folder-hd .arrow.off{transform:rotate(-90deg)}
.nav-folder-hd .fname{flex:1;font-size:13.5px;font-weight:700;color:var(--warm-grey);line-height:1.4}
.nav-folder-hd .fcnt{
  font-size:10px;color:var(--text3);background:var(--surface2);
  padding:2px 7px;border-radius:10px;min-width:20px;text-align:center;
  font-family:var(--font-en);
}
.nav-items{padding:2px 0}
.nav-items.off{display:none}
.nav-item{
  display:flex;align-items:center;padding:7px 20px 7px 40px;cursor:pointer;
  border-left:2px solid transparent;transition:all .12s var(--ease);
}
.nav-item:hover{background:var(--glow);border-left-color:var(--grey)}
.nav-item.active{background:var(--glow2);border-left-color:var(--yellow)}
.nav-item .ntitle{flex:1;font-size:12.5px;color:rgba(255,255,255,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4}
.nav-item.active .ntitle{color:var(--yellow);font-weight:600}
.nav-item .next{font-size:10px;color:var(--text3);opacity:0;transition:opacity .12s;flex-shrink:0;margin-left:6px}
.nav-item:hover .next{opacity:1}

.nav-subfolder{margin:0}
.nav-subfolder-hd{
  display:flex;align-items:center;gap:7px;padding:8px 20px 8px 34px;cursor:pointer;
  border-left:2px solid transparent;transition:all .12s var(--ease);
}
.nav-subfolder-hd:hover{background:var(--glow);border-left-color:var(--grey)}
.nav-subfolder-hd .arrow{font-size:7px;color:var(--text3);transition:transform .2s var(--ease);width:8px;text-align:center}
.nav-subfolder-hd .arrow.off{transform:rotate(-90deg)}
.nav-subfolder-hd .fname{flex:1;font-size:12px;font-weight:600;color:var(--bronze);line-height:1.4}
.nav-subfolder-hd .fcnt{font-size:9px;color:var(--bronze);background:rgba(139,105,20,.15);padding:2px 6px;border-radius:8px;font-family:var(--font-en)}
.nav-sub-item{padding-left:50px!important}
.nav-sub-item .ntitle{font-size:12px!important}

/* ===== CONTENT ===== */
.content{flex:1;overflow-y:auto;scroll-behavior:smooth}

/* ===== HOME / HERO ===== */
.home{max-width:1120px;margin:0 auto;padding:0 48px 100px}

.hero{
  position:relative;min-height:480px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;margin:0 -48px;padding:72px 48px 64px;
}
.hero-atmo{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.ghost{
  position:absolute;object-fit:cover;border-radius:6px;
  mix-blend-mode:screen;filter:brightness(.5) saturate(.3);
  opacity:0;animation:gf 1.4s ease-out forwards;loading:lazy;
}
@keyframes gf{from{opacity:0;transform:scale(1.06) translateY(8px)}to{opacity:var(--go,0.1);transform:scale(1) translateY(0)}}
.g1{left:1%;top:5%;width:150px;height:212px;--go:.11;filter:brightness(.45) saturate(.25) blur(1px);animation-delay:.15s}
.g2{left:9%;bottom:3%;width:125px;height:177px;--go:.09;filter:brightness(.4) saturate(.25) blur(2px);animation-delay:.35s}
.g3{left:20%;top:12%;width:115px;height:162px;--go:.13;filter:brightness(.5) saturate(.3) blur(.5px);animation-delay:.25s}
.g4{right:20%;top:8%;width:135px;height:191px;--go:.12;filter:brightness(.45) saturate(.28) blur(1px);animation-delay:.45s}
.g5{right:8%;bottom:5%;width:120px;height:170px;--go:.10;filter:brightness(.4) saturate(.25) blur(1.5px);animation-delay:.55s}
.g6{right:2%;top:15%;width:125px;height:177px;--go:.08;filter:brightness(.35) saturate(.2) blur(2.5px);animation-delay:.65s}
.g7{left:30%;bottom:0;width:105px;height:148px;--go:.07;filter:brightness(.4) saturate(.2) blur(2.5px);animation-delay:.75s}
.g8{right:30%;bottom:1%;width:105px;height:148px;--go:.09;filter:brightness(.4) saturate(.25) blur(2px);animation-delay:.4s}
.hero::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 65% at center,rgba(0,0,0,.88) 0%,rgba(0,0,0,.55) 45%,rgba(0,0,0,.25) 100%);
  z-index:1;pointer-events:none}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(transparent,#000);z-index:2;pointer-events:none}
.hero-inner{position:relative;z-index:3;text-align:center;max-width:680px}
.hero-logo{width:72px;height:auto;margin:0 auto 28px;display:block;filter:drop-shadow(0 0 20px rgba(255,199,44,.15))}
.hero-inner h1{
  font-size:52px;font-weight:900;color:var(--white);letter-spacing:6px;line-height:1.25;
  margin-bottom:8px;font-family:var(--font-cn);
}
.hero-inner h1 .y{
  background:var(--grad-brand);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.hero-en{font-size:11px;color:var(--text3);letter-spacing:6px;text-transform:uppercase;margin-bottom:14px;font-family:var(--font-en);font-weight:600}
.hero-desc{font-size:14px;color:var(--text2);font-weight:300;letter-spacing:4px;margin-bottom:36px;line-height:1.9}
.hero-stats{display:flex;justify-content:center;gap:56px}
.hero-stat .num{font-size:44px;font-weight:900;color:var(--yellow);line-height:1;font-family:var(--font-en)}
.hero-stat .unit{font-size:14px;color:var(--yellow);font-weight:300;font-family:var(--font-en)}
.hero-stat .lbl{font-size:10px;color:var(--text3);letter-spacing:2.5px;margin-top:6px;text-transform:uppercase;font-family:var(--font-en);font-weight:600}

/* ===== SECTION & CARDS ===== */
.sec-hd{
  display:flex;align-items:center;gap:12px;margin:40px 0 20px;
}
.sec-hd .sec-icon{font-size:18px;flex-shrink:0}
.sec-hd .sec-name{font-size:15px;font-weight:800;color:var(--text);letter-spacing:1px}
.sec-hd .sec-line{flex:1;height:1px;background:var(--border)}
.sec-hd .sec-cnt{font-size:10px;color:var(--text3);font-family:var(--font-en);background:var(--surface2);padding:3px 10px;border-radius:10px}
.sec-hd.sec-sub{margin:28px 0 14px;padding-left:14px;border-left:2px solid var(--bronze)}
.sec-hd.sec-sub .sec-name{font-size:13px;color:var(--bronze)}
.sec-hd.sec-sub .sec-cnt{background:rgba(139,105,20,.12);color:var(--bronze)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:8px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;cursor:pointer;transition:all .25s var(--ease);position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(255,199,44,.03) 0%,transparent 60%);opacity:0;transition:opacity .25s var(--ease);
}
.card:hover{border-color:var(--border-brand);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px rgba(255,199,44,.08)}
.card:hover::after{opacity:1}
.card-tag{
  font-size:10px;color:var(--yellow);letter-spacing:2px;font-weight:700;
  text-transform:uppercase;margin-bottom:12px;font-family:var(--font-en);
}
.card-title{font-size:16px;font-weight:700;color:var(--white);line-height:1.5;margin-bottom:10px;position:relative;z-index:1}
.card-summary{
  font-size:13px;color:var(--text3);line-height:1.8;font-weight:300;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  position:relative;z-index:1;
}
.card-ft{display:flex;justify-content:flex-end;margin-top:16px;position:relative;z-index:1}
.card-link{font-size:11px;color:var(--yellow);font-weight:600;letter-spacing:1px;font-family:var(--font-en);transition:letter-spacing .2s}
.card:hover .card-link{letter-spacing:2px}

/* ===== DOC PAGE ===== */
.doc-page{display:none;max-width:800px;margin:0 auto;padding:48px 48px 100px}
.doc-page.active{display:block}
.doc-back{
  display:inline-flex;align-items:center;gap:6px;color:var(--text3);font-size:13px;
  cursor:pointer;margin-bottom:32px;transition:color .15s;font-family:var(--font-en);
}
.doc-back:hover{color:var(--yellow)}
.doc-hd{margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border);position:relative}
.doc-hd::after{content:'';position:absolute;bottom:-1px;left:0;width:60px;height:2px;background:var(--yellow);border-radius:1px}
.doc-tag{font-size:10px;color:var(--yellow);letter-spacing:2.5px;font-weight:700;margin-bottom:14px;text-transform:uppercase;font-family:var(--font-en)}
.doc-title{font-size:28px;font-weight:900;color:var(--white);line-height:1.35;margin-bottom:18px;letter-spacing:.5px}
.doc-meta{display:flex;gap:10px;align-items:center}
.doc-ext{
  display:inline-flex;align-items:center;gap:6px;padding:8px 18px;
  background:var(--glow);border:1px solid var(--border-brand);border-radius:20px;
  color:var(--yellow);font-size:12px;font-weight:600;letter-spacing:.5px;
  transition:all .2s var(--ease);font-family:var(--font-en);
}
.doc-ext:hover{background:var(--glow2);text-decoration:none;opacity:1;letter-spacing:1px}
.doc-body{font-size:15px;line-height:2;color:rgba(255,255,255,.72);font-weight:300}
.doc-body h1{font-size:24px;font-weight:900;color:var(--white);margin:40px 0 16px;padding-bottom:12px;border-bottom:2px solid var(--yellow)}
.doc-body h2{font-size:19px;font-weight:700;color:var(--white);margin:28px 0 12px;padding-left:14px;border-left:3px solid var(--yellow)}
.doc-body h3{font-size:16px;font-weight:700;color:rgba(255,255,255,.88);margin:22px 0 8px}
.doc-body h4{font-size:15px;font-weight:600;color:rgba(255,255,255,.8);margin:18px 0 6px}
.doc-body p{margin-bottom:12px}
.doc-body strong{color:var(--white);font-weight:600}
.doc-body em{color:var(--yellow);font-style:normal}
.doc-body a{color:var(--yellow)}
.doc-body blockquote{border-left:3px solid var(--yellow);padding:10px 18px;margin:14px 0;background:var(--glow);color:var(--text2);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.doc-body pre{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;overflow-x:auto;margin:14px 0}
.doc-body code{font-family:"SF Mono","Fira Code",Consolas,monospace;font-size:12px}
.doc-body code:not(pre code){background:var(--surface2);padding:2px 6px;border-radius:3px;color:var(--yellow);font-size:12px}
.doc-body li{margin-left:20px;margin-bottom:4px}
.doc-body hr{border:none;border-top:1px solid var(--border);margin:28px 0}
.doc-body table{width:100%;border-collapse:collapse;margin:14px 0;font-size:13px}
.doc-body th,.doc-body td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.doc-body th{background:var(--surface2);color:var(--yellow);font-weight:600}

.doc-loading{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px}
.doc-loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== SEARCH ===== */
.search-page{display:none;max-width:800px;margin:0 auto;padding:48px 48px 100px}
.search-page.active{display:block}
.sr-item{
  padding:18px 22px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:all .15s var(--ease);border-left:2px solid transparent;
}
.sr-item:hover{background:var(--glow);border-left-color:var(--yellow)}
.sr-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:4px}
.sr-folder{font-size:10px;color:var(--yellow);letter-spacing:1.5px;font-weight:600;margin-bottom:8px;font-family:var(--font-en)}
.sr-snippet{font-size:13px;color:var(--text3);line-height:1.8;font-weight:300}
.sr-hl{background:var(--yellow);color:#000;padding:1px 3px;border-radius:2px;font-weight:700}
.sr-none{text-align:center;padding:80px 20px}
.sr-none .ic{font-size:40px;margin-bottom:16px;opacity:.2}
.sr-none .tx{color:var(--text3);font-size:14px}

.sidebar-overlay{display:none;position:fixed;top:56px;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:49}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .hero{min-height:380px;padding:52px 28px}
  .g1,.g2,.g3,.g4,.g5,.g6,.g7,.g8{width:80px!important;height:auto!important}
  .hero-inner h1{font-size:36px;letter-spacing:3px}
}
@media(max-width:768px){
  .mob-btn{display:flex;align-items:center;justify-content:center}
  .sidebar{position:fixed;top:56px;left:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .25s var(--ease);width:250px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .topbar-meta{display:none}
  .home{padding:0 20px 60px}
  .hero{padding:40px 20px;min-height:320px}
  .ghost{display:none}
  .hero-inner h1{font-size:28px;letter-spacing:2px}
  .hero-stats{gap:28px}
  .hero-stat .num{font-size:32px}
  .cards{grid-template-columns:1fr}
  .doc-page,.search-page{padding:24px 20px 60px}
  .doc-title{font-size:22px}
}
</style>
</head>

  '节目分析':'🎬',
  '年轻人餐饮消费及节目延伸专题研究':'🍜'
};

/* ===== 加载文件夹元数据（轻量，不含大文档正文） ===== */
function loadFolder(folderName) {
  if (loadedFolders[folderName]) return Promise.resolve();
  var idx = (window.FOLDER_INDEX||[]).find(function(f){return f.folder===folderName});
  if (!idx) return Promise.resolve();
  return new Promise(function(resolve) {
    var s = document.createElement('script');
    s.src = idx.dataFile;
    s.onload = function() {
      var data = window[idx.dataVar] || [];
      data.forEach(function(d) {
        if (!docMap[d.id]) { docMap[d.id] = d; ALL_DOCS.push(d); }
      });
      loadedFolders[folderName] = true;
      resolve();
    };
    s.onerror = function() { resolve(); };
    document.head.appendChild(s);
  });
}

function loadAllFolders() {
  if (allLoaded) return Promise.resolve();
  return Promise.all((window.FOLDER_INDEX||[]).map(function(f){return loadFolder(f.folder)}))
    .then(function(){ allLoaded = true; });
}

/* ===== 按需加载单篇大文档正文 ===== */
function loadDocContent(doc) {
  if (doc.content) return Promise.resolve(doc);
  // 标记为大文档的，从独立文件加载
  if (doc._big) {
    return new Promise(function(resolve) {
      var s = document.createElement('script');
      s.src = 'data/doc_' + doc.id + '.js';
      s.onload = function() {
        var fullDoc = window['DOC_DATA_' + doc.id];
        if (fullDoc) { doc.content = fullDoc.content; delete doc._big; }
        resolve(doc);
      };
      s.onerror = function() { resolve(doc); };
      document.head.appendChild(s);
    });
  }
  return Promise.resolve(doc);
}

function updateStats() {
  var total = ALL_DOCS.length;
  var chars = ALL_DOCS.reduce(function(s,d){return s+(d.content?d.content.length:0)},0);
  document.getElementById('hdCnt').textContent = total;
  document.getElementById('hdChars').textContent = Math.round(chars/10000);
  document.getElementById('stDocs').textContent = total;
  document.getElementById('stChars').innerHTML = Math.round(chars/10000)+'<span class="unit">万+</span>';
}

function buildSidebar() {
  var sb = document.getElementById('sidebar');
  var h = '<div class="sb-root"><h2>'+esc(ROOT_NAME)+'</h2><p>DOCLABS RESEARCH</p></div><div class="sb-label">CATEGORIES</div>';
  (window.FOLDER_INDEX||[]).forEach(function(fi) {
    var fid = fi.dataVar;
    var icon = FOLDER_ICONS[fi.folder]||'📄';
    var subfolders = fi.subfolders || [];
    h += '<div class="nav-folder"><div class="nav-folder-hd" onclick="toggleFolder(\''+fid+'\')"><span class="arrow" id="a_'+fid+'">▼</span><span class="name">'+icon+' '+esc(fi.folder)+'</span><span class="cnt">'+fi.count+'</span></div><div class="nav-items" id="i_'+fid+'">';
    // Direct docs (not in subfolders)
    var subDocIds = new Set();
    subfolders.forEach(function(sf){sf.docIds.forEach(function(d){subDocIds.add(d)})});
    for (var j=0;j<fi.docIds.length;j++) {
      if (!subDocIds.has(fi.docIds[j])) {
        h += '<div class="nav-item" data-id="'+fi.docIds[j]+'" onclick="showDoc(\''+fi.docIds[j]+'\',\''+esc(fi.folder)+'\')"><span class="ntitle">'+esc(fi.docTitles[j])+'</span><a href="'+fi.docUrls[j]+'" target="_blank" class="next" onclick="event.stopPropagation()">↗</a></div>';
      }
    }
    // Subfolders
    subfolders.forEach(function(sf) {
      var sfIcon = FOLDER_ICONS[sf.name]||'📁';
      var sfFid = fid + '_sf_' + sf.name.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'');
      h += '<div class="nav-subfolder"><div class="nav-subfolder-hd" onclick="toggleFolder(\''+sfFid+'\')"><span class="arrow" id="a_'+sfFid+'">▼</span><span class="name">'+sfIcon+' '+esc(sf.name)+'</span><span class="cnt">'+sf.docIds.length+'</span></div><div class="nav-items off" id="i_'+sfFid+'">';
      sf.docIds.forEach(function(did) {
        var idx = fi.docIds.indexOf(did);
        if (idx !== -1) {
          h += '<div class="nav-item nav-sub-item" data-id="'+did+'" onclick="showDoc(\''+did+'\',\''+esc(fi.folder)+'\')"><span class="ntitle">'+esc(fi.docTitles[idx])+'</span><a href="'+fi.docUrls[idx]+'" target="_blank" class="next" onclick="event.stopPropagation()">↗</a></div>';
        }
      });
      h += '</div></div>';
    });
    h += '</div></div>';
  });
  sb.innerHTML = h;
}

function buildCards() {
  var box = document.getElementById('cardsBox');
  var h = '';
  (window.FOLDER_INDEX||[]).forEach(function(fi) {
    var icon = FOLDER_ICONS[fi.folder]||'📄';
    var subfolders = fi.subfolders || [];
    var subDocIds = new Set();
    subfolders.forEach(function(sf){sf.docIds.forEach(function(d){subDocIds.add(d)})});
    h += '<div class="sec-hd"><span class="sec-icon">'+icon+'</span><span class="sec-name">'+esc(fi.folder)+'</span><span class="sec-line"></span><span class="sec-cnt">'+fi.count+'</span></div><div class="cards">';
    for (var j=0;j<fi.docIds.length;j++) {
      if (!subDocIds.has(fi.docIds[j])) {
        h += '<div class="card" onclick="showDoc(\''+fi.docIds[j]+'\',\''+esc(fi.folder)+'\')"><div class="card-tag">'+esc(fi.folder)+'</div><div class="card-title">'+esc(fi.docTitles[j])+'</div><div class="card-summary" id="cs_'+fi.docIds[j]+'">加载中…</div><div class="card-ft"><span class="card-link">阅读全文 →</span></div></div>';
      }
    }
    h += '</div>';
    // Subfolder cards
    subfolders.forEach(function(sf) {
      var sfIcon = FOLDER_ICONS[sf.name]||'📁';
      h += '<div class="sec-hd sec-sub">'+sfIcon+' ⊂ '+esc(sf.name)+'</div><div class="cards">';
      sf.docIds.forEach(function(did) {
        var idx = fi.docIds.indexOf(did);
        if (idx !== -1) {
          h += '<div class="card" onclick="showDoc(\''+did+'\',\''+esc(fi.folder)+'\')"><div class="card-tag">'+esc(sf.name)+'</div><div class="card-title">'+esc(fi.docTitles[idx])+'</div><div class="card-summary" id="cs_'+did+'">加载中…</div><div class="card-ft"><span class="card-link">阅读全文 →</span></div></div>';
        }
      });
      h += '</div>';
    });
  });
  box.innerHTML = h;
  // 异步加载摘要（文件夹元数据，轻量）
  (window.FOLDER_INDEX||[]).forEach(function(fi) {
    loadFolder(fi.folder).then(function() {
      fi.docIds.forEach(function(id) {
        var doc = docMap[id];
        var el = document.getElementById('cs_'+id);
        if (doc && el) {
          var summary = (doc.content||'').substring(0,120).replace(/[#*_\[\]\\]/g,'');
          if (summary.length < 10 && doc._big) summary = '大型文档，点击阅读全文…';
          el.textContent = summary ? summary+'…' : '';
        }
      });
      updateStats();
    });
  });
}

function md2html(md) {
  var t = md||'';
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  t = t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t = t.replace(/^####\s+(.+)$/gm,'<h4>$1</h4>');
  t = t.replace(/^###\s+(.+)$/gm,'<h3>$1</h3>');
  t = t.replace(/^##\s+(.+)$/gm,'<h2>$1</h2>');
  t = t.replace(/^#\s+(.+)$/gm,'<h1>$1</h1>');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  t = t.replace(/^[-*]\s+(.+)$/gm,'<li>$1</li>');
  t = t.replace(/^>\s+(.+)$/gm,'<blockquote>$1</blockquote>');
  t = t.replace(/^---+$/gm,'<hr>');
  t = t.replace(/\n\n+/g,'</p><p>');
  t = t.replace(/\n/g,'<br>');
  return t;
}

function tokenize(text) {
  if(!text)return[];
  text=text.toLowerCase();
  var tokens=new Set();
  var cn=text.match(/[\u4e00-\u9fff]/g)||[];
  cn.forEach(function(c){tokens.add(c)});
  for(var i=0;i<cn.length-1;i++)tokens.add(cn[i]+cn[i+1]);
  var en=text.match(/[a-z0-9]+/g)||[];
  en.forEach(function(w){tokens.add(w);if(w.length>3)for(var i=0;i<=w.length-3;i++)tokens.add(w.substring(i,i+3))});
  return Array.from(tokens);
}

var searchTimer=null;
window.handleSearch=function(q){
  document.getElementById('searchClear').style.display=q?'block':'none';
  clearTimeout(searchTimer);
  searchTimer=setTimeout(function(){doSearch(q)},250);
};

function doSearch(q){
  if(!q||q.trim().length<2){goHome();return}
  loadAllFolders().then(function(){
    var qt=new Set(tokenize(q));
    if(!qt.size){goHome();return}
    var results=ALL_DOCS.map(function(doc){
      var score=0;
      var tt=new Set(tokenize(doc.title));
      var ft=new Set(tokenize(doc.folder));
      var ct=new Set(tokenize(doc.content));
      qt.forEach(function(t){if(ct.has(t))score+=1;if(tt.has(t))score+=3;if(ft.has(t))score+=2});
      return{doc:doc,score:score};
    }).filter(function(r){return r.score>0}).sort(function(a,b){return b.score-a.score});
    showSearchResults(q,results);
  });
}

function showSearchResults(q,results){
  hideAll();
  var sp=document.getElementById('searchPage');
  sp.style.display='block';sp.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});
  var box=document.getElementById('searchResults');
  if(!results.length){box.innerHTML='<div class="sr-none"><div class="ic">⌕</div><div class="tx">未找到与 "'+esc(q)+'" 相关的内容</div></div>';return}
  box.innerHTML=results.map(function(r){
    var folderLabel = r.doc.folder;
    if (r.doc.subfolder) folderLabel = r.doc.folder + ' › ' + r.doc.subfolder;
    var snip=getSnippet(r.doc.content,q,160);
    return '<div class="sr-item" onclick="showDoc(\''+r.doc.id+'\',\''+esc(r.doc.folder)+'\')"><div class="sr-title">'+hl(r.doc.title,q)+'</div><div class="sr-folder">'+esc(folderLabel)+'</div><div class="sr-snippet">'+hl(snip,q)+'</div></div>';
  }).join('');
}

function getSnippet(content,q,maxLen){
  var lc=(content||'').toLowerCase();var lq=q.toLowerCase();
  var idx=lc.indexOf(lq);
  if(idx===-1){for(var i=0;i<q.length;i++){idx=lc.indexOf(q[i].toLowerCase());if(idx!==-1)break}}
  if(idx===-1)idx=0;
  var start=Math.max(0,idx-maxLen/3);var end=Math.min(content.length,start+maxLen);
  return(start>0?'…':'')+content.substring(start,end)+(end<content.length?'…':'');
}

function hl(text,q){var eq=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return esc(text).replace(new RegExp('('+eq+')','gi'),'<span class="sr-hl">$1</span>')}

window.clearSearch=function(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').style.display='none';
  goHome();
};

function hideAll(){
  document.getElementById('homePage').style.display='none';
  var dp=document.getElementById('docPage');dp.style.display='none';dp.classList.remove('active');
  var sp=document.getElementById('searchPage');sp.style.display='none';sp.classList.remove('active');
}

window.goHome=function(){
  hideAll();
  document.getElementById('homePage').style.display='block';
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active')});
  closeSB();
};

window.showDoc=function(id,folderName){
  var folder=folderName||'';
  var loadP=loadedFolders[folder]?Promise.resolve():loadFolder(folder);
  loadP.then(function(){
    var doc=docMap[id];
    if(!doc)return;
    hideAll();
    var dp=document.getElementById('docPage');
    dp.style.display='block';dp.classList.add('active');
    document.getElementById('dTag').textContent=doc.subfolder ? doc.folder+' › '+doc.subfolder : doc.folder;
    document.getElementById('dTitle').textContent=doc.title;
    document.getElementById('dExt').href=doc.url;
    
    // 如果内容已加载直接显示，否则先显示loading再按需加载
    if(doc.content){
      document.getElementById('dBody').innerHTML=md2html(doc.content);
    } else {
      document.getElementById('dBody').innerHTML='<div class="doc-loading"><div class="spinner"></div><br>文档加载中…</div>';
      loadDocContent(doc).then(function(d){
        document.getElementById('dBody').innerHTML=md2html(d.content||'内容加载失败，请直接在腾讯文档中查看');
      });
    }
    
    document.querySelectorAll('.nav-item').forEach(function(el){el.classList.toggle('active',el.dataset.id===id)});
    document.getElementById('contentArea').scrollTop=0;
    closeSB();
  });
};

window.toggleFolder=function(fid){
  var items=document.getElementById('i_'+fid);
  var arrow=document.getElementById('a_'+fid);
  if(items)items.classList.toggle('off');
  if(arrow)arrow.classList.toggle('off');
};

window.toggleSidebar=function(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
};

function closeSB(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

document.addEventListener('keydown',function(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus()}
  if(e.key==='Escape'){if(document.getElementById('searchInput').value)clearSearch();else if(document.getElementById('docPage').classList.contains('active'))goHome()}
});

function esc(t){var d=document.createElement('div');d.textContent=t||'';return d.innerHTML}

buildSidebar();
buildCards();
})();

</script>
