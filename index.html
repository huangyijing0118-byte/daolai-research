<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稻来调研报告 | DOC◇LABS Research</title>
<style>
/* ============================================
   稻来 VI 严格色彩体系
   来源：品牌色值规范文档
   ============================================ */
:root {
  --yellow:     #FFC72C;
  --black:      #000000;
  --grey:       #333333;
  --mid-grey:   #999999;
  --white:      #FFFFFF;
  --bronze:     #8B6914;
  --blue:       #4A627C;
  --warm-grey:  #B5A999;
  --gradient-brand: linear-gradient(135deg, #FFC72C 0%, #D4981A 40%, #8B6914 100%);
  --gradient-brand-h: linear-gradient(90deg, #FFC72C 0%, #D4981A 40%, #8B6914 100%);
  --bg-primary:   #000000;
  --bg-card:      #0A0A0A;
  --bg-hover:     #111111;
  --border-subtle: #1A1A1A;
  --border-brand:  rgba(255,199,44,0.35);
  --text-primary:  #FFFFFF;
  --text-secondary:#B5A999;
  --text-muted:    #777777;
  --brand-dim:     rgba(255,199,44,0.06);
  --brand-mid:     rgba(255,199,44,0.14);
  --brand-strong:  rgba(255,199,44,0.25);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:18px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:"PingFang SC","Noto Sans SC","Helvetica Neue",Arial,sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.7;overflow:hidden;height:100vh}
::selection{background:var(--yellow);color:var(--black)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--grey);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--mid-grey)}
a{color:var(--yellow);text-decoration:none;transition:opacity .15s}
a:hover{opacity:.8}

/* ===== 顶栏 ===== */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:60px;display:flex;align-items:center;gap:20px;
  padding:0 32px;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-subtle);
}
.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,var(--yellow) 50%,transparent 100%);
  opacity:.25;
}
.logo-group{display:flex;align-items:center;cursor:pointer;flex-shrink:0}
.logo-img{height:36px;width:auto;flex-shrink:0}

.search-box{flex:1;max-width:520px;position:relative}
.search-input{
  width:100%;height:38px;
  background:var(--grey);
  border:1px solid transparent;
  padding:0 40px 0 40px;
  font-size:14px;color:var(--white);outline:none;
  transition:border-color .2s;
}
.search-input::placeholder{color:var(--mid-grey)}
.search-input:focus{border-color:var(--yellow)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mid-grey);font-size:14px;pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--mid-grey);cursor:pointer;display:none;font-size:18px;line-height:1}
.search-clear:hover{color:var(--yellow)}

.header-right{display:flex;align-items:center;gap:14px;margin-left:auto;flex-shrink:0}
.header-stat{font-size:12px;color:var(--mid-grey);white-space:nowrap}
.header-stat .v{color:var(--yellow);font-weight:700}

.mobile-btn{display:none;background:none;border:1px solid var(--grey);color:var(--white);padding:4px 10px;cursor:pointer;font-size:18px}

/* ===== 布局 ===== */
.layout{display:flex;margin-top:60px;height:calc(100vh - 60px)}

/* ===== 侧栏 ===== */
.sidebar{
  width:280px;flex-shrink:0;
  border-right:1px solid var(--border-subtle);
  overflow-y:auto;padding:20px 0;
  background:var(--black);
}
.side-root{
  padding:0 20px 16px;
  border-bottom:1px solid var(--border-subtle);
  margin-bottom:12px;
}
.side-root-name{
  font-size:15px;font-weight:800;color:var(--yellow);
  letter-spacing:1px;line-height:1.4;
}
.side-root-sub{font-size:11px;color:var(--mid-grey);margin-top:2px;letter-spacing:1px}

.side-label{
  font-size:11px;color:var(--mid-grey);
  letter-spacing:3px;text-transform:uppercase;
  padding:12px 20px 6px;font-weight:600;
}
.nav-folder{margin-bottom:2px}
.nav-folder-hd{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .12s,border-color .12s;
}
.nav-folder-hd:hover{background:var(--brand-dim);border-left-color:var(--grey)}
.nav-folder-hd .arrow{
  font-size:10px;color:var(--mid-grey);
  transition:transform .2s;width:12px;
}
.nav-folder-hd .arrow.off{transform:rotate(-90deg)}
.nav-folder-hd .name{flex:1;font-size:14px;font-weight:700;color:var(--warm-grey);line-height:1.4}
.nav-folder-hd .cnt{
  font-size:11px;color:var(--mid-grey);
  background:var(--grey);padding:2px 8px;
  min-width:22px;text-align:center;
}
.nav-items{padding:2px 0}
.nav-items.off{display:none}
.nav-item{
  display:flex;align-items:center;
  padding:8px 20px 8px 44px;cursor:pointer;
  border-left:3px solid transparent;
  transition:background .12s,border-color .12s;
}
.nav-item:hover{background:var(--brand-dim);border-left-color:var(--grey)}
.nav-item.active{background:var(--brand-mid);border-left-color:var(--yellow)}
.nav-item .title{
  flex:1;font-size:13px;color:rgba(255,255,255,.7);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.4;
}
.nav-item.active .title{color:var(--yellow);font-weight:600}
.nav-item .ext{font-size:11px;color:var(--mid-grey);opacity:0;transition:opacity .12s;flex-shrink:0;margin-left:8px}
.nav-item:hover .ext{opacity:1}

/* ===== 内容区 ===== */
.content{flex:1;overflow-y:auto}

/* ===== 首页 Hero ===== */
.home{max-width:1100px;margin:0 auto;padding:0 48px 80px}

.hero-banner{
  position:relative;
  margin:-0px -48px 0;
  padding:48px 48px 40px;
  overflow:hidden;
  min-height:340px;
  display:flex;
  align-items:center;
  gap:40px;
}
.hero-posters{
  display:flex;gap:12px;flex-shrink:0;
  position:relative;z-index:1;
}
.hero-poster{
  width:160px;height:226px;
  object-fit:cover;
  border:1px solid rgba(255,199,44,0.15);
  transition:transform .3s,box-shadow .3s;
  cursor:default;
}
.hero-poster:hover{
  transform:scale(1.04);
  box-shadow:0 8px 32px rgba(255,199,44,0.12);
}
.hero-poster-label{
  font-size:10px;color:var(--yellow);letter-spacing:2px;
  text-align:center;margin-top:8px;font-weight:600;
}
.hero-text{
  position:relative;z-index:1;flex:1;
}
.hero-logo-img{
  width:72px;height:auto;margin-bottom:20px;
}
.hero-text h1{
  font-size:42px;font-weight:900;color:var(--white);
  letter-spacing:6px;line-height:1.3;margin-bottom:6px;
}
.hero-text h1 .y{color:var(--yellow)}
.hero-text .en{
  font-size:13px;color:var(--mid-grey);letter-spacing:4px;
  text-transform:uppercase;margin-bottom:8px;
}
.hero-text .desc{
  font-size:15px;color:var(--warm-grey);font-weight:300;
  letter-spacing:2px;line-height:1.7;margin-bottom:20px;
}
.hero-stats{display:flex;gap:40px}
.hero-stat .num{font-size:38px;font-weight:900;color:var(--yellow);line-height:1}
.hero-stat .unit{font-size:15px;color:var(--yellow);font-weight:300}
.hero-stat .label{font-size:11px;color:var(--mid-grey);letter-spacing:2px;margin-top:4px;text-transform:uppercase}

/* 装饰背景光 */
.hero-banner::before{
  content:'';position:absolute;top:-60%;right:-10%;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(255,199,44,0.06) 0%,transparent 70%);
  pointer-events:none;
}

.divider{border:none;height:1px;background:var(--border-subtle);margin:32px 0}

/* 分类标题 */
.sec-title{
  font-size:14px;color:var(--yellow);
  letter-spacing:3px;font-weight:700;
  margin:28px 0 16px;
  display:flex;align-items:center;gap:12px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border-subtle)}

/* 卡片网格 */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:12px}
.card{
  background:var(--bg-card);
  border:1px solid var(--border-subtle);
  padding:22px 24px;cursor:pointer;
  transition:border-color .2s,transform .2s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gradient-brand-h);opacity:0;transition:opacity .2s;
}
.card:hover{border-color:var(--border-brand);transform:translateY(-2px)}
.card:hover::before{opacity:1}
.card-folder{font-size:11px;color:var(--yellow);letter-spacing:2px;font-weight:700;margin-bottom:10px;text-transform:uppercase}
.card-title{font-size:17px;font-weight:700;color:var(--white);line-height:1.5;margin-bottom:10px}
.card-summary{
  font-size:13.5px;color:var(--mid-grey);line-height:1.8;font-weight:300;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-ft{display:flex;justify-content:flex-end;margin-top:14px}
.card-link{font-size:12px;color:var(--yellow);font-weight:600;letter-spacing:1px}

/* — 文档详情 — */
.doc-page{display:none;max-width:840px;margin:0 auto;padding:40px 48px 80px}
.doc-page.active{display:block}
.doc-back{
  display:inline-flex;align-items:center;gap:6px;
  color:var(--mid-grey);font-size:14px;cursor:pointer;
  margin-bottom:28px;transition:color .12s;
}
.doc-back:hover{color:var(--yellow)}
.doc-hd{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border-subtle);position:relative}
.doc-hd::after{content:'';position:absolute;bottom:-1px;left:0;width:56px;height:2px;background:var(--yellow)}
.doc-tag{font-size:11px;color:var(--yellow);letter-spacing:2px;font-weight:700;margin-bottom:12px;text-transform:uppercase}
.doc-title{font-size:30px;font-weight:900;color:var(--white);line-height:1.35;margin-bottom:16px;letter-spacing:1px}
.doc-meta{display:flex;gap:10px;align-items:center}
.doc-ext{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;background:var(--brand-dim);
  border:1px solid var(--border-brand);
  color:var(--yellow);font-size:13px;font-weight:600;
  letter-spacing:.5px;transition:background .15s;
}
.doc-ext:hover{background:var(--brand-mid);text-decoration:none;opacity:1}

.doc-body{font-size:16px;line-height:2;color:rgba(255,255,255,.78);font-weight:300}
.doc-body h1{font-size:26px;font-weight:900;color:var(--white);margin:44px 0 18px;padding-bottom:12px;border-bottom:2px solid var(--yellow)}
.doc-body h2{font-size:20px;font-weight:700;color:var(--white);margin:32px 0 14px;padding-left:14px;border-left:3px solid var(--yellow)}
.doc-body h3{font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:26px 0 10px}
.doc-body h4{font-size:16px;font-weight:600;color:rgba(255,255,255,.85);margin:20px 0 8px}
.doc-body p{margin-bottom:14px}
.doc-body strong{color:var(--white);font-weight:600}
.doc-body em{color:var(--yellow);font-style:normal}
.doc-body a{color:var(--yellow)}
.doc-body blockquote{border-left:3px solid var(--yellow);padding:10px 18px;margin:16px 0;background:var(--brand-dim);color:var(--warm-grey)}
.doc-body pre{background:#0A0A0A;border:1px solid var(--border-subtle);padding:16px;overflow-x:auto;margin:16px 0}
.doc-body code{font-family:"SF Mono","Fira Code",Consolas,monospace;font-size:13px}
.doc-body code:not(pre code){background:var(--grey);padding:2px 6px;color:var(--yellow)}
.doc-body li{margin-left:20px;margin-bottom:6px}
.doc-body hr{border:none;border-top:1px solid var(--border-subtle);margin:32px 0}
.doc-body table{width:100%;border-collapse:collapse;margin:16px 0}
.doc-body th,.doc-body td{border:1px solid var(--border-subtle);padding:8px 12px;text-align:left}
.doc-body th{background:var(--grey);color:var(--yellow);font-weight:600}

/* — 搜索结果 — */
.search-page{display:none;max-width:840px;margin:0 auto;padding:40px 48px 80px}
.search-page.active{display:block}
.sr-item{
  padding:16px 20px;border-bottom:1px solid var(--border-subtle);
  cursor:pointer;transition:background .12s;
  border-left:3px solid transparent;
}
.sr-item:hover{background:var(--brand-dim);border-left-color:var(--yellow)}
.sr-title{font-size:16px;font-weight:700;color:var(--white);margin-bottom:4px}
.sr-folder{font-size:11px;color:var(--yellow);letter-spacing:1px;font-weight:600;margin-bottom:8px}
.sr-snippet{font-size:13.5px;color:var(--mid-grey);line-height:1.8;font-weight:300}
.sr-hl{background:var(--yellow);color:var(--black);padding:1px 3px;font-weight:700}
.sr-none{text-align:center;padding:60px 20px}
.sr-none .ic{font-size:48px;margin-bottom:16px;opacity:.25}
.sr-none .tx{color:var(--mid-grey);font-size:15px}

.sidebar-overlay{display:none;position:fixed;top:60px;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:49}

/* ===== 响应式 ===== */
@media(max-width:900px){
  .hero-banner{flex-direction:column;align-items:flex-start;gap:24px;padding:32px 24px 28px}
  .hero-posters{gap:10px}
  .hero-poster{width:120px;height:170px}
  .hero-text h1{font-size:30px;letter-spacing:3px}
}
@media(max-width:768px){
  .mobile-btn{display:block}
  .sidebar{position:fixed;top:60px;left:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .25s;width:260px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .header-stat{display:none}
  .home{padding:0 20px 60px}
  .hero-banner{padding:24px 20px 20px}
  .hero-text h1{font-size:24px;letter-spacing:2px}
  .hero-poster{width:100px;height:142px}
  .cards{grid-template-columns:1fr}
  .doc-page,.search-page{padding:24px 20px 60px}
  .doc-title{font-size:22px}
  .hero-stats{gap:20px}
  .hero-stat .num{font-size:28px}
}
</style>
</head>

<!-- ===== 主布局 ===== -->
<div class="layout">

<!-- ===== 数据加载 ===== -->
<script src="data/index.js"></script>
<script>
(function(){
'use strict';

/* ===== 状态 ===== */
const ALL_DOCS = [];
const docMap = {};
const loadedFolders = new Set();
let allLoaded = false;

/* 主文件夹名 */
const ROOT_NAME = '2025-2026稻来调研报告';

/* 子文件夹配置 */
const FOLDER_ICONS = {
  '年轻人餐饮消费及节目延伸专题研究':'🍜',
  '当代潮玩现象研究及相关行业报告':'🎨',
  '专题调研':'🔬',
  'AI与纪录片':'🤖',
  '节目分析':'🎬',
  '每月纪实报告':'📊'
};

/* ===== 懒加载 ===== */
function loadFolder(folderName) {
  return new Promise(resolve => {
    const idx = (window.FOLDER_INDEX || []).find(f => f.folder === folderName);
    if (!idx || loadedFolders.has(folderName)) { resolve(); return; }
    const s = document.createElement('script');
    s.src = idx.dataFile;
    s.onload = function() {
      const data = window[idx.dataVar];
      if (data) {
        data.forEach(d => {
          if (!docMap[d.id]) {
            docMap[d.id] = d;
            ALL_DOCS.push(d);
          }
        });
      }
      loadedFolders.add(folderName);
      resolve();
    };
    s.onerror = function() { resolve(); };
    document.head.appendChild(s);
  });
}

function loadAllFolders() {
  if (allLoaded) return Promise.resolve();
  const promises = (window.FOLDER_INDEX || []).map(f => loadFolder(f.folder));
  return Promise.all(promises).then(() => { allLoaded = true; });
}

/* ===== 统计 ===== */
function updateStats() {
  const total = ALL_DOCS.length;
  const chars = ALL_DOCS.reduce((s,d) => s + (d.content ? d.content.length : 0), 0);
  document.getElementById('hdCnt').textContent = total;
  document.getElementById('hdChars').textContent = Math.round(chars / 10000);
  document.getElementById('stDocs').textContent = total;
  document.getElementById('stChars').innerHTML = Math.round(chars/10000) + '<span class="unit">万+</span>';
}

/* ===== 侧栏 — 层级结构 ===== */
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let h = '';
  /* 根文件夹 */
  h += '<div class="side-root">';
  h += '<div class="side-root-name">' + esc(ROOT_NAME) + '</div>';
  h += '<div class="side-root-sub">DOCLABS RESEARCH</div>';
  h += '</div>';
  h += '<div class="side-label">专题分类</div>';

  (window.FOLDER_INDEX || []).forEach(fi => {
    const fid = fi.dataVar;
    const icon = FOLDER_ICONS[fi.folder] || '📄';
    h += '<div class="nav-folder">';
    h += '<div class="nav-folder-hd" onclick="toggleFolder(\'' + fid + '\')">';
    h += '<span class="arrow" id="a_' + fid + '">▼</span>';
    h += '<span class="name">' + icon + ' ' + esc(fi.folder) + '</span>';
    h += '<span class="cnt">' + fi.count + '</span>';
    h += '</div>';
    h += '<div class="nav-items" id="i_' + fid + '">';
    for (let j = 0; j < fi.docIds.length; j++) {
      h += '<div class="nav-item" data-id="' + fi.docIds[j] + '" onclick="showDoc(\'' + fi.docIds[j] + '\',\'' + esc(fi.folder) + '\')">';
      h += '<span class="title">' + esc(fi.docTitles[j]) + '</span>';
      h += '<a href="' + fi.docUrls[j] + '" target="_blank" class="ext" onclick="event.stopPropagation()">↗</a>';
      h += '</div>';
    }
    h += '</div></div>';
  });
  sb.innerHTML = h;
}

/* ===== 首页卡片 — 层级展示 ===== */
function buildCards() {
  const box = document.getElementById('cardsBox');
  let h = '';
  (window.FOLDER_INDEX || []).forEach(fi => {
    const icon = FOLDER_ICONS[fi.folder] || '📄';
    h += '<div class="sec-title">' + icon + ' ' + esc(fi.folder) + '</div>';
    h += '<div class="cards">';
    for (let j = 0; j < fi.docIds.length; j++) {
      h += '<div class="card" onclick="showDoc(\'' + fi.docIds[j] + '\',\'' + esc(fi.folder) + '\')">';
      h += '<div class="card-folder">' + esc(fi.folder) + '</div>';
      h += '<div class="card-title">' + esc(fi.docTitles[j]) + '</div>';
      h += '<div class="card-summary" id="cs_' + fi.docIds[j] + '">加载中…</div>';
      h += '<div class="card-ft"><span class="card-link">阅读全文 →</span></div>';
      h += '</div>';
    }
    h += '</div>';
  });
  box.innerHTML = h;

  /* 异步加载摘要 */
  (window.FOLDER_INDEX || []).forEach(fi => {
    loadFolder(fi.folder).then(() => {
      fi.docIds.forEach(id => {
        const doc = docMap[id];
        const el = document.getElementById('cs_' + id);
        if (doc && el) {
          const summary = (doc.content || '').substring(0, 120).replace(/[#*_\[\]\\]/g, '');
          el.textContent = summary + '…';
        }
      });
      updateStats();
    });
  });
}

/* ===== Markdown → HTML ===== */
function md2html(md) {
  let t = md || '';
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  t = t.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  t = t.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  t = t.replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>');
  t = t.replace(/^>\s+(.+)$/gm, '<blockquote>$1</blockquote>');
  t = t.replace(/^---+$/gm, '<hr>');
  t = t.replace(/\n\n+/g, '</p><p>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

/* ===== 搜索 ===== */
function tokenize(text) {
  if (!text) return [];
  text = text.toLowerCase();
  const tokens = new Set();
  const cn = text.match(/[\u4e00-\u9fff]/g) || [];
  cn.forEach(c => tokens.add(c));
  for (let i = 0; i < cn.length - 1; i++) tokens.add(cn[i] + cn[i+1]);
  const en = text.match(/[a-z0-9]+/g) || [];
  en.forEach(w => { tokens.add(w); if (w.length > 3) for (let i = 0; i <= w.length - 3; i++) tokens.add(w.substring(i, i+3)); });
  return Array.from(tokens);
}

let searchTimer = null;
window.handleSearch = function(q) {
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(q), 250);
};

function doSearch(q) {
  if (!q || q.trim().length < 2) { goHome(); return; }
  loadAllFolders().then(() => {
    const qt = new Set(tokenize(q));
    if (!qt.size) { goHome(); return; }
    const results = ALL_DOCS.map(doc => {
      let score = 0;
      const tt = new Set(tokenize(doc.title));
      const ft = new Set(tokenize(doc.folder));
      const ct = new Set(tokenize(doc.content));
      qt.forEach(t => {
        if (ct.has(t)) score += 1;
        if (tt.has(t)) score += 3;
        if (ft.has(t)) score += 2;
      });
      return { doc, score };
    }).filter(r => r.score > 0).sort((a,b) => b.score - a.score);
    showSearchResults(q, results);
  });
}

function showSearchResults(q, results) {
  hideAll();
  const sp = document.getElementById('searchPage');
  sp.style.display = 'block'; sp.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const box = document.getElementById('searchResults');
  if (!results.length) {
    box.innerHTML = '<div class="sr-none"><div class="ic">⌕</div><div class="tx">未找到与 "' + esc(q) + '" 相关的内容</div></div>';
    return;
  }
  box.innerHTML = results.map(r => {
    const snip = getSnippet(r.doc.content, q, 160);
    return '<div class="sr-item" onclick="showDoc(\'' + r.doc.id + '\',\'' + esc(r.doc.folder) + '\')">' +
      '<div class="sr-title">' + hl(r.doc.title, q) + '</div>' +
      '<div class="sr-folder">' + esc(r.doc.folder) + '</div>' +
      '<div class="sr-snippet">' + hl(snip, q) + '</div>' +
      '</div>';
  }).join('');
}

function getSnippet(content, q, maxLen) {
  const lc = (content||'').toLowerCase();
  const lq = q.toLowerCase();
  let idx = lc.indexOf(lq);
  if (idx === -1) { for (const c of q) { idx = lc.indexOf(c.toLowerCase()); if (idx !== -1) break; } }
  if (idx === -1) idx = 0;
  const start = Math.max(0, idx - maxLen/3);
  const end = Math.min(content.length, start + maxLen);
  return (start > 0 ? '…' : '') + content.substring(start, end) + (end < content.length ? '…' : '');
}

function hl(text, q) {
  const eq = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return esc(text).replace(new RegExp('(' + eq + ')','gi'), '<span class="sr-hl">$1</span>');
}

window.clearSearch = function() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  goHome();
};

/* ===== 导航 ===== */
function hideAll() {
  document.getElementById('homePage').style.display = 'none';
  const dp = document.getElementById('docPage');
  dp.style.display = 'none'; dp.classList.remove('active');
  const sp = document.getElementById('searchPage');
  sp.style.display = 'none'; sp.classList.remove('active');
}

window.goHome = function() {
  hideAll();
  document.getElementById('homePage').style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  closeSB();
};

window.showDoc = function(id, folderName) {
  const folder = folderName || '';
  const loadP = loadedFolders.has(folder) ? Promise.resolve() : loadFolder(folder);
  loadP.then(() => {
    const doc = docMap[id];
    if (!doc) return;
    hideAll();
    const dp = document.getElementById('docPage');
    dp.style.display = 'block'; dp.classList.add('active');
    document.getElementById('dTag').textContent = doc.folder;
    document.getElementById('dTitle').textContent = doc.title;
    document.getElementById('dExt').href = doc.url;
    document.getElementById('dBody').innerHTML = md2html(doc.content);
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });
    document.getElementById('contentArea').scrollTop = 0;
    closeSB();
  });
};

window.toggleFolder = function(fid) {
  const items = document.getElementById('i_' + fid);
  const arrow = document.getElementById('a_' + fid);
  if (items) items.classList.toggle('off');
  if (arrow) arrow.classList.toggle('off');
};

window.toggleSidebar = function() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
};

function closeSB() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('searchInput').value) clearSearch();
    else if (document.getElementById('docPage').classList.contains('active')) goHome();
  }
});

function esc(t) { const d = document.createElement('div'); d.textContent = t || ''; return d.innerHTML; }

/* ===== 启动 ===== */
buildSidebar();
buildCards();

})();
</script>
